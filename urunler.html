        // Katalog Filtreleme Fonksiyonu
        function kategoriSec(secilenKategori) {
            // Buton renklerini ayarla
            document.querySelectorAll('.kategori-btn').forEach(btn => btn.classList.remove('kategori-aktif'));
            if(document.getElementById('btn-' + secilenKategori)) {
                document.getElementById('btn-' + secilenKategori).classList.add('kategori-aktif');
            }

            // Başlığı Güncelle
            const basliklar = {
                'hepsi': 'Tüm Ürünler', 'soguk': 'Soğuk Meşrubatlar', 'kuruyemis': 'Kuruyemiş & Cips',
                'temel': 'Temel Gıdalar', 'sarkuteri': 'Şarküteri & Manav', 'temizlik': 'Ev Temizlik & Hijyen', 'evcil': 'Evcil Hayvan Ürünleri'
            };
            document.getElementById('kategoriBaslik').innerText = basliklar[secilenKategori] || 'Ürünler';

            // Ürünleri Filtrele ve Bas
            const grid = document.getElementById('urunGrid');
            grid.innerHTML = ""; 
            
            const gosterilecekUrunler = secilenKategori === 'hepsi' ? urunler : urunler.filter(u => u.kategori === secilenKategori);
            
            // Kaç ürün olduğunu yaz
            document.getElementById('urunSayisi').innerText = `${gosterilecekUrunler.length} ürün listeleniyor`;

            gosterilecekUrunler.forEach(urun => {
                grid.innerHTML += `
                    <div class="bg-gece rounded-xl overflow-hidden shadow-lg border border-gray-800 hover:border-sari transition group flex flex-col">
                        <div class="h-48 overflow-hidden bg-white flex items-center justify-center p-4">
                            <img src="${urun.resim}" alt="${urun.ad}" class="w-full h-full object-contain group-hover:scale-110 transition duration-500">
                        </div>
                        <div class="p-5 flex flex-col flex-grow justify-between text-center border-t border-gray-800">
                            <h4 class="text-white font-semibold mb-3 text-sm h-10 overflow-hidden">${urun.ad}</h4>
                            <p class="text-sari font-bold text-xl">${urun.fiyat}</p>
                        </div>
                    </div>
                `;
            });
        }

        // Sayfa Yüklendiğinde Ana Sayfadan Gelen Linki (Hash) Kontrol Et
        document.addEventListener('DOMContentLoaded', () => {
            // Eğer urunler.html#kuruyemis gibi bir linkle gelindiyse direkt o sekmeyi aç
            const hash = window.location.hash.substring(1); 
            if(hash && ['hepsi', 'soguk', 'kuruyemis', 'temel', 'sarkuteri', 'temizlik', 'evcil'].includes(hash)) {
                kategoriSec(hash);
            } else {
                kategoriSec('hepsi');
            }
        });
